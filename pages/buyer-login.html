<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Buyer Login | Farm2Hotel
</title>

<link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href=
"https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href=
"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
'Poppins',
sans-serif;
}

body{

background:#e8f1eb;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;
padding:20px;

}

.login-container{

width:100%;
max-width:1200px;

background:#fff;

border-radius:40px;
overflow:hidden;

display:flex;

box-shadow:
0 20px 60px
rgba(0,0,0,0.08);

}


/* LEFT */

.left-panel{

width:50%;

background:
linear-gradient(
135deg,
#198754,
#146c43
);

color:#fff;

padding:70px 60px;

display:flex;
flex-direction:column;
justify-content:center;

}

.left-panel h1{

font-size:62px;
font-weight:700;

margin-bottom:25px;

}

.left-panel p{

font-size:20px;
line-height:1.8;

opacity:0.95;

margin-bottom:50px;

}

.feature{

display:flex;
align-items:center;

gap:14px;

font-size:24px;
margin-bottom:28px;

}

.feature i{
color:#a6ffbf;
}


/* RIGHT */

.right-panel{

width:50%;
padding:70px 65px;

display:flex;
flex-direction:column;
justify-content:center;

}

.right-panel h2{

font-size:60px;
font-weight:700;

margin-bottom:10px;

}

.sub-text{

color:#666;
font-size:20px;

margin-bottom:40px;

}

.form-label{

font-weight:600;
font-size:22px;

margin-bottom:12px;

}

.form-control{

height:65px;

border-radius:20px;
font-size:20px;

padding:20px;

border:1px solid #ddd;

}

.form-control:focus{

box-shadow:none;
border-color:#198754;

}

.password-wrapper{
position:relative;
}

.eye-icon{

position:absolute;
right:20px;
top:22px;

cursor:pointer;
font-size:22px;
color:#777;

}

.login-options{

display:flex;
justify-content:space-between;
align-items:center;

margin-top:20px;
margin-bottom:30px;

font-size:18px;

}

.login-btn{

width:100%;
height:70px;

border:none;
border-radius:20px;

background:#198754;
color:#fff;

font-size:28px;
font-weight:700;

transition:0.3s;

}

.login-btn:hover{
background:#146c43;
}

.bottom-link{

text-align:center;
margin-top:35px;
font-size:22px;

}

.bottom-link a{

text-decoration:none;
font-weight:700;
color:#198754;

}

.error{

color:red;
font-size:14px;
margin-top:8px;

}


/* MOBILE */

@media(max-width:992px){

.login-container{
flex-direction:column;
}

.left-panel,
.right-panel{

width:100%;
padding:40px;

}

.left-panel h1{
font-size:45px;
}

.right-panel h2{
font-size:42px;
}

}

</style>

</head>

<body>

<div class="login-container">

<!-- LEFT -->

<div class="left-panel">

<h1>
Farm2Hotel
</h1>

<p>
Directly connect hotels,
restaurants and buyers
with farmers for daily
fresh vegetable supply.
</p>

<div class="feature">

<i class=
"fa-solid fa-square-check">
</i>

Daily Fresh Supply

</div>

<div class="feature">

<i class=
"fa-solid fa-square-check">
</i>

Direct Farmer Purchase

</div>

<div class="feature">

<i class=
"fa-solid fa-square-check">
</i>

Trusted Farmers

</div>

<div class="feature">

<i class=
"fa-solid fa-square-check">
</i>

Transparent Pricing

</div>

</div>


<!-- RIGHT -->

<div class="right-panel">

<h2>
Welcome Back 👋
</h2>

<p class="sub-text">

Login to continue buying
fresh vegetables

</p>

<label class="form-label">

Mobile Number

</label>

<input
type="text"
id="mobile"
class="form-control"
placeholder=
"Enter mobile number">

<div
id="mobileError"
class="error">
</div>


<label class="form-label mt-4">

Password

</label>

<div class="password-wrapper">

<input
type="password"
id="password"
class="form-control"
placeholder=
"Enter password">

<i
class=
"fa-solid fa-eye eye-icon"
onclick=
"togglePassword()">
</i>

</div>

<div
id="passwordError"
class="error">
</div>

<!-- LOGIN OPTIONS -->

<div class="login-options">

<div>

<input
type="checkbox"
id="rememberMe">

<label for="rememberMe">

Remember Me

</label>

</div>

<a href="#">

Forgot Password?

</a>

</div>


<button
class="login-btn"
id="loginBtn"
onclick="loginBuyer()">

Login

</button>


<div class="bottom-link">

Don't have an account?

<a href=
"buyer-register.html">

Register

</a>

</div>

</div>

</div>


<script>

// ======================
// SHOW / HIDE PASSWORD
// ======================

function
togglePassword(){

const password =

document
.getElementById(
"password"
);

if(
password.type ===
"password"
){

password.type =
"text";

}
else{

password.type =
"password";

}

}


// ======================
// LOGIN BUYER
// ======================

async function
loginBuyer(){

// CLEAR ERRORS

document
.getElementById(
"mobileError"
)
.innerText = "";

document
.getElementById(
"passwordError"
)
.innerText = "";


// GET VALUES

const mobile =

document
.getElementById(
"mobile"
)
.value.trim();

const password =

document
.getElementById(
"password"
)
.value.trim();

let isValid =
true;


// MOBILE VALIDATION

if(
!/^[6-9]\d{9}$/
.test(mobile)
){

document
.getElementById(
"mobileError"
)
.innerText =

"Enter valid mobile number";

isValid = false;

}


// PASSWORD VALIDATION

if(
password.length < 6
){

document
.getElementById(
"passwordError"
)
.innerText =

"Password required";

isValid = false;

}

if(
!isValid
){
return;
}


// BUTTON LOADING

const btn =

document
.getElementById(
"loginBtn"
);

btn.innerText =
"Logging In...";

btn.disabled =
true;


try{

const response =
await fetch(

"http://farm2hotel.onrender.com/api/buyers/login",

{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify({

mobile,
password

})

}

);

const data =
await response.json();


// LOGIN FAILED

if(
!response.ok
){

alert(
data.message
||

"Login Failed ❌"
);

btn.innerText =
"Login";

btn.disabled =
false;

return;

}


// SAVE BUYER SESSION

localStorage.setItem(

"buyer",

JSON.stringify(
data.buyer
)

);


// SUCCESS

alert(
"Login Successful ✅"
);

window.location.href =
"./buyer-dashboard.html";

}
catch(error){

console.log(error);

alert(
"Server Error ❌"
);

btn.innerText =
"Login";

btn.disabled =
false;

}

}

</script>

</body>
</html>
