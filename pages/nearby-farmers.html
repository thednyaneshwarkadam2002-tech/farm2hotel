<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content=
"width=device-width, initial-scale=1.0">

<title>
Farm2Hotel | Nearby Farmers
</title>

<link
href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href=
"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link
href=
"https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fb;
overflow-x:hidden;
}


/* TOPBAR */

.topbar{

background:#fff;

padding:22px 40px;

display:flex;
justify-content:space-between;
align-items:center;

box-shadow:
0 10px 30px
rgba(0,0,0,.05);

position:sticky;
top:0;
z-index:999;
}

.logo{

font-size:30px;
font-weight:700;
color:#198754;
}

.back-btn{

border:none;

background:
linear-gradient(
135deg,
#198754,
#157347
);

color:#fff;

padding:14px 26px;

border-radius:50px;

font-weight:600;

transition:.3s;
}

.back-btn:hover{
transform:translateY(-2px);
}


/* PAGE */

.page{
padding:30px;
}

.page-header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:35px;

flex-wrap:wrap;
gap:20px;
}

.page-header h1{

font-size:42px;
font-weight:700;
}

.page-header p{
color:#666;
margin-top:8px;
}


/* SEARCH */

.search-box{

position:relative;

width:380px;
max-width:100%;
}

.search-box i{

position:absolute;

left:18px;
top:50%;

transform:
translateY(-50%);

color:#777;
}

.search-box input{

width:100%;

border:none;
outline:none;

padding:
18px
20px
18px
52px;

border-radius:20px;

background:#fff;

box-shadow:
0 10px 30px
rgba(0,0,0,.05);
}


/* FARMER CARD */

.farmer-card{

background:#fff;

border-radius:35px;

padding:28px;

box-shadow:
0 10px 30px
rgba(0,0,0,.05);

transition:.3s;

height:100%;
}

.farmer-card:hover{

transform:
translateY(-8px);
}

.farmer-top{

display:flex;
align-items:center;
gap:18px;

margin-bottom:22px;
}

.farmer-img{

width:90px;
height:90px;

border-radius:50%;

object-fit:cover;

border:
4px solid
#198754;
}

.farmer-name{

font-size:24px;
font-weight:700;
}

.farm-type{

background:#e9f7ef;
color:#198754;

padding:8px 18px;

border-radius:50px;

font-size:13px;
font-weight:600;

display:inline-block;

margin-top:8px;
}


/* INFO BOX */

.info-grid{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:15px;

margin-top:20px;
}

.info-box{

background:#f4f7fb;

padding:18px;

border-radius:20px;
}

.info-box small{
color:#777;
}

.info-box h6{

margin-top:8px;
font-weight:600;
}


/* BUTTONS */

.action-buttons{

display:flex;
gap:12px;

margin-top:25px;
}

.action-buttons button{

flex:1;

border:none;

padding:15px;

border-radius:50px;

font-weight:600;
transition:.3s;
}

.view-btn{

background:
linear-gradient(
135deg,
#198754,
#157347
);

color:#fff;
}

.message-btn{

background:#eef2f7;
}

.call-btn{

background:#d1e7dd;
color:#0f5132;
}

.action-buttons button:hover{

transform:
translateY(-2px);
}


/* EMPTY */

.empty-box{

background:#fff;

padding:80px;

border-radius:35px;

text-align:center;

box-shadow:
0 10px 30px
rgba(0,0,0,.05);
}

.empty-box i{

font-size:70px;

color:#198754;

margin-bottom:20px;
}


/* MOBILE */

@media(max-width:992px){

.page{
padding:20px;
}

.page-header h1{
font-size:30px;
}

.info-grid{
grid-template-columns:1fr;
}

.topbar{
padding:20px;
}

}

/* DASHBOARD */

.dashboard{
display:flex;
min-height:100vh;
}


/* SIDEBAR */

.sidebar{

width:290px;

background:
linear-gradient(
180deg,
#198754,
#0f5132
);

padding:30px 20px;

position:fixed;

height:100vh;

overflow-y:auto;

color:#fff;

z-index:999;
}

.logo-box{
margin-bottom:40px;
}

.logo-box h2{
font-size:34px;
font-weight:700;
}

.logo-box p{
opacity:.8;
font-size:14px;
}

.menu{
list-style:none;
padding:0;
}

.menu li{
margin-bottom:10px;
}

.menu a{

display:flex;
align-items:center;
gap:14px;

padding:16px 18px;

border-radius:18px;

text-decoration:none;
color:#fff;

font-size:16px;
font-weight:500;

transition:.3s;
}

.menu a:hover,
.menu .active{

background:
rgba(255,255,255,.15);

}

.menu i{
font-size:18px;
}


/* MAIN CONTENT */

.main-content{

margin-left:290px;

width:calc(100% - 290px);
}


/* MOBILE */

@media(max-width:992px){

.sidebar{
display:none;
}

.main-content{
margin-left:0;
width:100%;
}

}

</style>

</head>

<body>

    <div class="dashboard">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo-box">

<h2>
🌱 Farm2Hotel
</h2>

<p>
Premium Buyer Panel
</p>

</div>

<ul class="menu">

<li>
<a href="buyer-dashboard.html">
<i class="fa-solid fa-house"></i>
Dashboard
</a>
</li>

<li>
<a href="browse-market.html">
<i class="fa-solid fa-seedling"></i>
Browse Market
</a>
</li>

<li>
<a href="cart.html">
<i class="fa-solid fa-cart-shopping"></i>
Cart
</a>
</li>

<li>
<a href="my-orders.html">
<i class="fa-solid fa-box"></i>
My Orders
</a>
</li>

<li>
<a href="nearby-farmers.html"
class="active">

<i class="fa-solid fa-location-dot"></i>

Nearby Farmers
</a>
</li>

<li>
<a href="wishlist.html">
<i class="fa-solid fa-heart"></i>
Wishlist
</a>
</li>

<li>
<a href="buyer-messages.html">
<i class="fa-solid fa-message"></i>
Messages
</a>
</li>

<li>
<a href="payments.html">
<i class="fa-solid fa-wallet"></i>
Payments
</a>
</li>

<li>
<a href="buyer-profile.html">
<i class="fa-solid fa-user"></i>
Profile
</a>
</li>

<li>
<a href="#"
onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

Logout
</a>
</li>

</ul>

</aside>

<main class="main-content">




<div class="page">

<div class="page-header">

<div>

<h1>
📍 Nearby Farmers
</h1>

<p>
Connect directly with nearby farmers
</p>

</div>

<div class="search-box">

<i class="fa-solid fa-search"></i>

<input
type="text"
id="searchInput"
placeholder=
"Search farmers, village...">

</div>

</div>


<!-- FARMERS LIST -->

<div
class="row"
id="farmersContainer">

Loading...

</div>

</div>

<script>

// ======================
// LOGIN CHECK
// ======================

const loggedBuyer =

JSON.parse(
localStorage.getItem(
"buyer"
)
);

if(
!loggedBuyer
){

window.location.href =
"./buyer-login.html";

}


// ======================
// LOAD FARMERS
// ======================

async function
loadFarmers(){

try{

const response =
await fetch(

"https://farm2hotel.onrender.com/api/farmers/nearby"

);

const farmers =
await response.json();

console.log(
"Nearby Farmers:",
farmers
);

let html = "";


// ======================
// EMPTY STATE
// ======================

if(
farmers.length === 0
){

html =
`
<div class=
"col-12">

<div class=
"empty-box">

<i class=
"fa-solid fa-user-group">

</i>

<h2 class=
"fw-bold">

No Nearby Farmers

</h2>

<p class=
"text-muted mt-2">

No farmers available
near your location

</p>

</div>

</div>
`;

document
.getElementById(
"farmersContainer"
)
.innerHTML =
html;

return;

}


// ======================
// FARMER CARD
// ======================

farmers.forEach(farmer=>{

let imageUrl =

`https://ui-avatars.com/api/?name=${encodeURIComponent(
farmer.full_name ||
"Farmer"
)}&background=198754&color=fff`;


// PROFILE IMAGE FIX

if(
farmer.profile_image &&
farmer.profile_image.trim() !== ""
){

if(
farmer.profile_image.startsWith(
"data:image"
)
){

imageUrl =
farmer.profile_image;

}
else{

imageUrl =
`data:image/jpeg;base64,${farmer.profile_image}`;

}

}

html +=
`
<div class=
"col-lg-4
col-md-6
mb-4">

<div class=
"farmer-card">

<div class=
"farmer-top">

<img
src=
"${imageUrl}"

class=
"farmer-img"

onerror=
"this.src='https://ui-avatars.com/api/?name=Farmer'">

<div>

<h3 class=
"farmer-name">

${farmer.farm_name || "Farm"}

</h3>

<p class=
"text-muted mb-0">

👨‍🌾
${farmer.full_name || "Farmer"}

</p>

<span class=
"farm-type">

${farmer.farm_type || "Organic Farm"}

</span>

</div>

</div>



<div class=
"info-grid">

<div class=
"info-box">

<small>
Village
</small>

<h6>

${farmer.village || "N/A"}

</h6>

</div>


<div class=
"info-box">

<small>
District
</small>

<h6>

${farmer.district || "N/A"}

</h6>

</div>


<div class=
"info-box">

<small>
Experience
</small>

<h6>

${farmer.experience || 0}
Years

</h6>

</div>


<div class=
"info-box">

<small>
Farm Size
</small>

<h6>

${farmer.farm_size || "N/A"}

Acre

</h6>

</div>

</div>



<div class=
"action-buttons">

<button
class=
"view-btn"

onclick=
"viewFarm(${farmer.id})">

🌱 View Farm

</button>

<button
class=
"message-btn"

onclick=
"messageFarmer(${farmer.id})">

💬 Message

</button>

<button
class=
"call-btn"

onclick=
"callFarmer('${farmer.mobile}')">

📞

</button>

</div>

</div>

</div>
`;

});


document
.getElementById(
"farmersContainer"
)
.innerHTML =
html;

}
catch(error){

console.log(
"Farmer Error:",
error
);

}

}


// ======================
// SEARCH
// ======================

document
.getElementById(
"searchInput"
)

.addEventListener(

"keyup",

function(){

const value =
this.value
.toLowerCase();

const cards =
document
.querySelectorAll(
".col-lg-4"
);

cards.forEach(card=>{

const text =
card.innerText
.toLowerCase();

card.style.display =

text.includes(value)

?

"block"

:

"none";

});

}

);


// ======================
// VIEW FARM
// ======================

function
viewFarm(id){

window.location.href =

`farmer-details.html?id=${id}`;

}


// ======================
// MESSAGE FARMER
// ======================

function
messageFarmer(id){

window.location.href =

`buyer-messages.html?farmerId=${id}`;

}


// ======================
// CALL FARMER
// ======================

function
callFarmer(number){

if(
!number
||
number === "null"
){

return alert(
"Phone number not available"
);

}

window.location.href =
`tel:${number}`;

}


// ======================
// PAGE LOAD
// ======================

window.onload =
function(){

loadFarmers();

};

</script>

</body>
</html>
