<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content=
"width=device-width, initial-scale=1.0">

<title>
Buyer Messages
</title>

<link
href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href=
"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link
href=
"https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
'Poppins',
sans-serif;
}

body{
background:#f4f7fb;
overflow:hidden;
}

.wrapper{
display:flex;
height:100vh;
}

/* LEFT */

.sidebar{
width:350px;
background:#fff;
border-right:
1px solid #eee;
display:flex;
flex-direction:column;
}

.header{
padding:25px;
border-bottom:
1px solid #eee;
font-size:30px;
font-weight:700;
}

.farmer-list{
flex:1;
overflow-y:auto;
}

.user{
display:flex;
align-items:center;
gap:15px;
padding:18px;
cursor:pointer;
transition:.3s;
border-bottom:
1px solid #f1f1f1;
}

.user:hover{
background:#eefaf2;
}

.user img{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
}

.user-info h5{
margin:0;
font-size:18px;
font-weight:600;
}

.user-info p{
margin:0;
font-size:14px;
color:#777;
}

/* RIGHT */

.chat{
flex:1;
display:flex;
flex-direction:column;
background:#f8fafc;
}

.chat-top{
background:#fff;
padding:20px 25px;
display:flex;
align-items:center;
gap:15px;
border-bottom:
1px solid #eee;
}

.chat-top img{
width:60px;
height:60px;
border-radius:50%;
}

.chat-top h4{
margin:0;
font-weight:700;
}

.chat-body{
flex:1;
padding:25px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:15px;
}

.message{
max-width:350px;
padding:16px 20px;
border-radius:22px;
font-size:15px;
}

.sent{
background:#198754;
color:#fff;
align-self:flex-end;
}

.received{
background:#fff;
align-self:flex-start;
box-shadow:
0 5px 20px
rgba(0,0,0,.05);
}

.chat-input{
background:#fff;
padding:20px;
display:flex;
gap:15px;
border-top:
1px solid #eee;
}

.chat-input input{
flex:1;
border:none;
outline:none;
background:#eef2f7;
padding:18px;
border-radius:18px;
}

.send-btn{
width:65px;
height:65px;
border:none;
border-radius:18px;
background:#198754;
color:#fff;
font-size:22px;
}
.dashboard{
display:flex;
min-height:100vh;
}

.sidebar{
width:280px;
background:#fff;
padding:30px 20px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.logo-box{
text-align:center;
margin-bottom:30px;
}

.logo-box h2{
font-weight:700;
color:#198754;
}

.logo-box p{
font-size:14px;
color:#777;
}

.menu{
list-style:none;
padding:0;
}

.menu li{
margin-bottom:12px;
}

.menu li a{
display:flex;
align-items:center;
gap:12px;
padding:15px 20px;
text-decoration:none;
border-radius:18px;
color:#333;
font-weight:500;
transition:.3s;
}

.menu li a:hover,
.menu li a.active{
background:#198754;
color:#fff;
}

.main-content{
flex:1;
padding:25px;
overflow:hidden;
}

.chat-sidebar{
width:350px;
background:#fff;
border-radius:30px;
overflow:hidden;
border-right:1px solid #eee;
}

</style>

</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo-box">

<h2>🌱 Farm2Hotel</h2>

<p>Premium Buyer Panel</p>

</div>

<ul class="menu">

<li>
<a href="buyer-dashboard.html">
<i class="fa-solid fa-house"></i>
Dashboard
</a>
</li>

<li>
<a href="browse-market.html">
<i class="fa-solid fa-seedling"></i>
Browse Market
</a>
</li>

<li>
<a href="cart.html">
<i class="fa-solid fa-cart-shopping"></i>
Cart
</a>
</li>

<li>
<a href="my-orders.html">
<i class="fa-solid fa-box"></i>
My Orders
</a>
</li>

<li>
<a href="nearby-farmers.html">
<i class="fa-solid fa-location-dot"></i>
Nearby Farmers
</a>
</li>

<li>
<a href="wishlist.html">
<i class="fa-solid fa-heart"></i>
Wishlist
</a>
</li>

<li>
<a href="buyer-messages.html"
class="active">

<i class="fa-solid fa-message"></i>
Messages
</a>
</li>

<li>
<a href="payments.html">
<i class="fa-solid fa-wallet"></i>
Payments
</a>
</li>

<li>
<a href="buyer-profile.html">
<i class="fa-solid fa-user"></i>
Profile
</a>
</li>

<li>
<a href="#"
onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>
Logout
</a>
</li>

</ul>

</aside>

<!-- MAIN CONTENT -->

<main class="main-content">

<div class="wrapper">

<!-- FARMER LIST -->

<div class="chat-sidebar">

<div class="header">
Farmers 💬
</div>

<div
class="farmer-list"
id="farmerList">
</div>

</div>


<!-- RIGHT -->

<div class="chat">

<div class="chat-top">

<img
id="chatProfile"
src=
"https://ui-avatars.com/api/?name=Farmer">

<div>

<h4
id="chatName">

Select Farmer

</h4>

<p class="text-success">
● Online
</p>

</div>

</div>


<div
class="chat-body"
id="chatBody">

<div class="received message">
Start Chat 👋
</div>

</div>


<div class="chat-input">

<input
type="text"
id="messageInput"
placeholder=
"Type message...">

<button
class="send-btn"
onclick=
"sendMessage()">

<i class=
"fa-solid fa-paper-plane">
</i>

</button>

</div>

</div>

</div>


<script>

// ======================
// LOGIN CHECK
// ======================

const buyer =
JSON.parse(
localStorage.getItem(
"buyer"
)
);

if(!buyer){

window.location.href =
"./buyer-login.html";

}

let currentFarmerId =
null;


// ======================
// LOAD FARMERS
// ======================

async function
loadFarmers(){

try{

const response =
await fetch(

`http://farm2hotel.onrender.com/api/messages/farmers/${buyer.id}`

);

const farmers =
await response.json();

let html = "";

if(
farmers.length === 0
){

html =
`
<div class=
"text-center p-4">

No Messages Yet ❌

</div>
`;

}

farmers.forEach(farmer=>{

html +=
`
<div
class=
"user"

onclick=
"openChat(

${farmer.id},

'${farmer.farmer_name}'

)">

<img
src=
"https://ui-avatars.com/api/?name=${farmer.farmer_name}&background=198754&color=fff">

<div class=
"user-info">

<h5>
${farmer.farmer_name}
</h5>

<p>
Click to open chat
</p>

</div>

</div>
`;

});

document
.getElementById(
"farmerList"
)
.innerHTML =
html;

}
catch(error){

console.log(error);

}

}


// ======================
// OPEN CHAT
// ======================

async function
openChat(

farmerId,
farmerName

){

currentFarmerId =
farmerId;

document
.getElementById(
"chatName"
)
.innerText =
farmerName;

document
.getElementById(
"chatProfile"
)
.src =

`https://ui-avatars.com/api/?name=${farmerName}&background=198754&color=fff`;

try{

const response =
await fetch(

`http://farm2hotel.onrender.com/api/messages/chat/${farmerId}/${buyer.id}`

);

const chats =
await response.json();

let html = "";

if(
chats.length === 0
){

html =
`
<div class=
"message received">

Start Conversation 👋

</div>
`;

}

chats.forEach(chat=>{

const type =

chat.sender_type
=== "Buyer"

?

"sent"

:

"received";

html +=
`
<div
class=
"message ${type}">

${chat.message}

</div>
`;

});

document
.getElementById(
"chatBody"
)
.innerHTML =
html;

scrollBottom();

}
catch(error){

console.log(error);

}

}


// ======================
// SEND MESSAGE
// ======================

async function
sendMessage(){

const input =
document
.getElementById(
"messageInput"
);

const message =
input.value.trim();

if(
!message
||
!currentFarmerId
){

return;

}

try{

await fetch(

"http://farm2hotel.onrender.com/api/messages/send",

{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify({

sender_id:
buyer.id,

sender_type:
"Buyer",

receiver_id:
currentFarmerId,

receiver_type:
"Farmer",

message

})

}

);

input.value = "";

openChat(

currentFarmerId,

document
.getElementById(
"chatName"
)
.innerText

);

}
catch(error){

console.log(error);

}

}


// ======================
// ENTER KEY
// ======================

document
.getElementById(
"messageInput"
)

.addEventListener(

"keypress",

function(e){

if(
e.key ===
"Enter"
){

sendMessage();

}

}

);


// ======================
// AUTO REFRESH
// ======================

setInterval(()=>{

if(
currentFarmerId
){

openChat(

currentFarmerId,

document
.getElementById(
"chatName"
)
.innerText

);

}

},3000);


// ======================
// AUTO SCROLL
// ======================

function
scrollBottom(){

const body =
document
.getElementById(
"chatBody"
);

body.scrollTop =
body.scrollHeight;

}


// ======================
// PAGE LOAD
// ======================

window.onload =
function(){

loadFarmers();

};

</script>
</div>

</div>

</main>

</div>

</body>
</html>
