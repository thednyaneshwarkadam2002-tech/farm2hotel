<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Farmer Login | Farm2Hotel
</title>

<link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href=
"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href=
"https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
'Poppins',
sans-serif;
}

body{

background:
linear-gradient(
135deg,
#e8fff1,
#ffffff
);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

}

.login-container{

width:100%;
max-width:1100px;

background:#fff;

border-radius:35px;
overflow:hidden;

display:flex;

box-shadow:
0 20px 50px
rgba(0,0,0,.08);

}

/* LEFT */

.left-side{

width:50%;

background:
linear-gradient(
135deg,
#198754,
#0f5132
);

color:#fff;

padding:60px;

display:flex;
flex-direction:column;
justify-content:center;

}

.left-side h1{

font-size:50px;
font-weight:700;

}

.left-side p{

margin-top:20px;
font-size:18px;
line-height:1.8;

}

.feature{

margin-top:18px;
font-size:20px;

}

/* RIGHT */

.right-side{

width:50%;
padding:70px 60px;

display:flex;
flex-direction:column;
justify-content:center;

}

.right-side h2{

font-size:42px;
font-weight:700;

}

.sub-text{

color:#666;
margin-bottom:35px;

}

.form-label{

font-weight:600;

}

.form-control{

height:58px;
border-radius:18px;
padding:18px;

}

.password-box{
position:relative;
}

.eye{

position:absolute;
right:20px;
top:20px;
cursor:pointer;
color:#666;

}

.login-btn{

width:100%;
height:60px;

border:none;
border-radius:18px;

background:#198754;
color:#fff;

font-size:22px;
font-weight:700;

margin-top:20px;

}

.login-btn:hover{
background:#157347;
}

.bottom-link{

text-align:center;
margin-top:25px;

}

.bottom-link a{

text-decoration:none;
font-weight:700;
color:#198754;

}

@media(max-width:992px){

.login-container{
flex-direction:column;
}

.left-side,
.right-side{

width:100%;

}

}

</style>

</head>

<body>

<div class="login-container">

<!-- LEFT -->

<div class="left-side">

<h1>
🌱 Farm2Hotel
</h1>

<p>
Directly connect farmers
with buyers, restaurants
and hotels.
</p>

<div class="feature">
✅ Better Vegetable Price
</div>

<div class="feature">
✅ Daily Orders
</div>

<div class="feature">
✅ Trusted Buyers
</div>

<div class="feature">
✅ Fast Payments
</div>

</div>

<!-- RIGHT -->

<div class="right-side">

<h2>
Welcome Back 👋
</h2>

<p class="sub-text">
Login to continue your farming business
</p>

<div class="mb-3">

<label class="form-label">
Mobile Number
</label>

<input
type="tel"
id="mobile"
class="form-control"
placeholder=
"Enter mobile number">

</div>

<div class="mb-3">

<label class="form-label">
Password
</label>

<div class="password-box">

<input
type="password"
id="password"
class="form-control"
placeholder=
"Enter password">

<i
class=
"fa-solid fa-eye eye"
onclick=
"togglePassword()">
</i>

</div>

</div>

<button
class="login-btn"
onclick=
"loginFarmer()">

Login

</button>

<div class="bottom-link">

Don't have account?

<a href=
"farmer-register.html">

Register

</a>

</div>

</div>

</div>

<script>

// SHOW PASSWORD

function togglePassword(){

const password =
document.getElementById(
"password"
);

password.type =
password.type ===
"password"

?

"text"

:

"password";

}


// LOGIN

async function loginFarmer(){

const mobile =
document.getElementById(
"mobile"
).value.trim();

const password =
document.getElementById(
"password"
).value.trim();


// VALIDATION

if(!mobile || !password){

alert(
"Please fill all fields"
);

return;

}


try{

const response =
await fetch(

"http://farm2hotel.onrender.com/api/farmers/login",

{
method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify({

mobile,
password

})

}

);

const data =
await response.json();

console.log(
"Login Data:",
data
);

console.log("FULL DATA:", data);

alert(
JSON.stringify(data)
);


// SUCCESS

if(response.ok){

localStorage.setItem(

"farmer",

JSON.stringify(
data.farmer
)

);

alert(
"Login Successful ✅"
);


// REDIRECT

window.location.href =
"./farmer-dashboard.html";
}
else{

alert(
data.message ||
"Invalid Login ❌"
);

}

}
catch(error){

console.log(error);

alert(
"Server Error ❌"
);

}

}

</script>

</body>
</html>
