<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content=
"width=device-width, initial-scale=1.0">

<title>
Vegetable Sellers
</title>

<link
href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href=
"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link
href=
"https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fb;
min-height:100vh;
padding:40px;
}

.header-box{

background:
linear-gradient(
135deg,
#198754,
#157347
);

padding:40px;
border-radius:35px;
color:#fff;
margin-bottom:35px;

box-shadow:
0 15px 35px
rgba(0,0,0,.12);

}

.back-btn{

background:#fff;
border:none;
padding:12px 20px;
border-radius:50px;
font-weight:600;
color:#198754;
margin-bottom:20px;

}

.page-title{

font-size:42px;
font-weight:700;

}

.subtitle{

opacity:.9;
font-size:18px;

}

.seller-card{

background:#fff;

border-radius:35px;

padding:25px;

box-shadow:
0 10px 30px
rgba(0,0,0,.08);

transition:.3s;

height:100%;
}

.seller-card:hover{

transform:
translateY(-5px);

}

.profile{

width:90px;
height:90px;

border-radius:50%;

object-fit:cover;

border:4px solid #198754;

}

.farm-name{

font-size:28px;
font-weight:700;

}

.location{

color:#777;
font-size:15px;

}

.price{

font-size:35px;
font-weight:700;
color:#198754;

}

.stock{

font-size:18px;
font-weight:600;

margin-top:10px;
}

.badge-stock{

background:#effcf4;
color:#198754;
padding:10px 16px;
border-radius:50px;
font-weight:600;

}

.action-btn{

height:52px;
border-radius:50px;
font-weight:600;

}

.empty-box{

background:#fff;
padding:60px;
border-radius:35px;
text-align:center;

box-shadow:
0 10px 30px
rgba(0,0,0,.08);

}

.loading{

text-align:center;
font-size:20px;
font-weight:600;
padding:60px;
}

@media(max-width:768px){

body{
padding:20px;
}

.page-title{
font-size:32px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header-box">

<button
class="back-btn"
onclick="goBack()">

← Back

</button>

<h1
class="page-title"
id="title">

Loading Sellers...

</h1>

<p class="subtitle">

Choose your farmer and deal directly 💬🌱

</p>

</div>


<!-- SELLERS -->

<div
class="row"
id="sellerList">

<div class="loading">

Loading Sellers...

</div>

</div>

</div>


<script>

// ======================
// API
// ======================

const API_BASE =
"http://farm2hotel.onrender.com/api";


// ======================
// GET VEGETABLE NAME
// ======================

const params =
new URLSearchParams(
window.location.search
);

const vegetableName =
params.get(
"vegetable"
);

console.log(
"Vegetable:",
vegetableName
);


// ======================
// LOAD SELLERS
// ======================

async function
loadSellers(){

try{

// Title update

document
.getElementById(
"title"
)
.innerText =

`${vegetableName || "Vegetable"}
Sellers 🌱`;


// API CALL

const response =
await fetch(

`${API_BASE}/market/sellers/${encodeURIComponent(vegetableName)}`

);

const sellers =
await response.json();

console.log(
"Sellers:",
sellers
);

let html = "";


// EMPTY

if(
!sellers ||
sellers.length === 0
){

html =
`
<div class="col-12">

<div class="empty-box">

<h2>
❌ No Sellers Found
</h2>

<p class="text-muted mt-3">

No farmers are currently selling
<b>
${vegetableName}
</b>

</p>

</div>

</div>
`;

document
.getElementById(
"sellerList"
)
.innerHTML =
html;

return;

}


// SELLERS LOOP

sellers.forEach(item=>{

html +=

`
<div class=
"col-lg-6
mb-4">

<div class=
"seller-card">

<div class=
"d-flex justify-content-between align-items-start flex-wrap gap-3">

<div class=
"d-flex gap-3">

<img
src=
"http://farm2hotel.onrender.com/uploads/${item.profile_image}"

class=
"profile"

onerror=
"this.src='https://ui-avatars.com/api/?name=Farmer'">

<div>

<div class=
"farm-name">

${item.farm_name}

</div>

<p class=
"location">

📍
${item.village || ""}
${item.district || ""}

</p>

<p class=
"text-muted mb-0">

👨‍🌾
${item.owner_name || "Farmer"}

</p>

</div>

</div>


<div class=
"text-end">

<div class=
"price">

₹${item.price}

</div>

<p class=
"text-muted">

Per KG

</p>

</div>

</div>


<div class=
"d-flex justify-content-between align-items-center mt-4 flex-wrap gap-2">

<div class=
"badge-stock">

📦
${item.quantity}
KG Available

</div>

</div>


<div class=
"d-flex gap-2 mt-4">

<button
class=
"btn btn-success w-100 action-btn"

onclick=
"buyNow(
${item.id},
${item.farmer_id}
)">

🛒 Buy Now

</button>


<button
class=
"btn btn-outline-primary action-btn px-4"

onclick=
"chatFarmer(
${item.farmer_id}
)">

💬 Chat

</button>

</div>

</div>

</div>
`;

});

document
.getElementById(
"sellerList"
)
.innerHTML =
html;

}
catch(error){

console.log(
"Seller Error:",
error
);

document
.getElementById(
"sellerList"
)
.innerHTML =

`
<div class="col-12">

<div class="empty-box">

<h2>
❌ Failed To Load
</h2>

<p class="text-muted">

Something went wrong

</p>

</div>

</div>
`;

}

}


// ======================
// CHAT FARMER
// ======================

function
chatFarmer(
farmerId
){

window.location.href =

`buyer-messages.html?farmerId=${farmerId}`;

}


// ======================
// BUY NOW
// ======================

function
buyNow(
vegetableId,
farmerId
){

window.location.href =

`product-details.html?id=${vegetableId}`;

}


// ======================
// BACK
// ======================

function
goBack(){

window.history.back();

}


// ======================
// PAGE LOAD
// ======================

window.onload =
loadSellers;

</script>

</body>
</html>
