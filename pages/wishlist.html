<html lang="en">

<head>

name="viewport"
content=

<title>
Farm2Hotel | Wishlist

<link
href=

rel="stylesheet">

<link
rel="stylesheet"
href=
"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link
href=

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fb;
overflow-x:hidden;
}


/* TOPBAR */

.topbar{

background:#fff;

padding:22px 40px;

display:flex;
justify-content:space-between;
align-items:center;

box-shadow:
0 10px 30px
rgba(0,0,0,.05);

position:sticky;
top:0;
z-index:999;
}

.logo{

font-size:30px;
font-weight:700;
color:#198754;
}

.back-btn{

border:none;

background:
linear-gradient(
135deg,
#198754,
#157347
);

color:#fff;

padding:14px 26px;

border-radius:50px;

font-weight:600;

transition:.3s;
}

.back-btn:hover{
transform:translateY(-2px);
}


/* PAGE */

.page{
padding:30px;
}

.page-header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:35px;

flex-wrap:wrap;
gap:20px;
}

.page-header h1{

font-size:42px;
font-weight:700;
}

.page-header p{
color:#666;
margin-top:8px;
}


/* SEARCH */

.search-box{

position:relative;

width:380px;
max-width:100%;
}

.search-box i{

position:absolute;

left:18px;
top:50%;

transform:
translateY(-50%);

color:#777;
}

.search-box input{

width:100%;

border:none;
outline:none;

padding:
18px
20px
18px
52px;

border-radius:20px;

background:#fff;

box-shadow:
0 10px 30px
rgba(0,0,0,.05);
}


/* PRODUCT CARD */

.product-card{

background:#fff;

border-radius:35px;

overflow:hidden;

box-shadow:
0 10px 30px
rgba(0,0,0,.05);

transition:.3s;

height:100%;
}

.product-card:hover{

transform:
translateY(-8px);
}

.product-image{

width:100%;
height:260px;

object-fit:cover;
}

.product-content{
padding:25px;
}

.product-title{

font-size:24px;
font-weight:700;
}

.product-category{
color:#777;
margin-top:5px;
}

.product-price{

font-size:28px;
font-weight:700;

color:#198754;

margin-top:12px;
}

.stock-badge{

display:inline-block;

margin-top:12px;

padding:8px 18px;

border-radius:50px;

font-size:13px;
font-weight:600;
}

.in-stock{

background:#d1e7dd;
color:#0f5132;
}

.low-stock{

background:#fff3cd;
color:#856404;
}


/* BUTTONS */

.action-buttons{

display:flex;
gap:12px;

margin-top:25px;
}

.action-buttons button{

flex:1;

border:none;

padding:15px;

border-radius:50px;

font-weight:600;
transition:.3s;
}

.cart-btn{

background:
linear-gradient(
135deg,
#198754,
#157347
);

color:#fff;
}

.remove-btn{

background:#ffe5e5;
color:#dc3545;
}

.action-buttons button:hover{
transform:translateY(-2px);
}


/* EMPTY */

.empty-box{

background:#fff;

padding:80px;

border-radius:35px;

text-align:center;

box-shadow:
0 10px 30px
rgba(0,0,0,.05);
}

.empty-box i{

font-size:70px;

color:#dc3545;

margin-bottom:20px;
}


/* MOBILE */

@media(max-width:992px){

.page{
padding:20px;
}

.page-header h1{
font-size:30px;
}

.topbar{
padding:20px;
}

}
/* DASHBOARD */

.dashboard{
display:flex;
min-height:100vh;
}


/* SIDEBAR */

.sidebar{

width:290px;

background:
linear-gradient(
180deg,
#198754,
#0f5132
);

padding:30px 20px;

position:fixed;

height:100vh;

overflow-y:auto;

color:#fff;

z-index:999;
}

.logo-box{
margin-bottom:40px;
}

.logo-box h2{
font-size:34px;
font-weight:700;
}

.logo-box p{
opacity:.8;
font-size:14px;
}

.menu{
list-style:none;
padding:0;
}

.menu li{
margin-bottom:10px;
}

.menu a{

display:flex;
align-items:center;
gap:14px;

padding:16px 18px;

border-radius:18px;

text-decoration:none;
color:#fff;

font-size:16px;
font-weight:500;

transition:.3s;
}

.menu a:hover,
.menu .active{

background:
rgba(255,255,255,.15);

}

.menu i{
font-size:18px;
}


/* MAIN CONTENT */

.main-content{

margin-left:290px;

width:calc(100% - 290px);
}


/* MOBILE */

@media(max-width:992px){

.sidebar{
display:none;
}

.main-content{
margin-left:0;
width:100%;
}

}
</style>

</head>

<body>

    <div class="dashboard">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo-box">

<h2>
🌱 Farm2Hotel
</h2>

<p>
Premium Buyer Panel
</p>

</div>

<ul class="menu">

<li>
<a href="buyer-dashboard.html">
<i class="fa-solid fa-house"></i>
Dashboard
</a>
</li>

<li>
<a href="browse-market.html">
<i class="fa-solid fa-seedling"></i>
Browse Market
</a>
</li>

<li>
<a href="cart.html">
<i class="fa-solid fa-cart-shopping"></i>
Cart
</a>
</li>

<li>
<a href="my-orders.html">
<i class="fa-solid fa-box"></i>
My Orders
</a>
</li>

<li>
<a href="nearby-farmers.html">

<i class="fa-solid fa-location-dot"></i>

Nearby Farmers
</a>
</li>

<li>
<a href="wishlist.html"
class="active">
<i class="fa-solid fa-heart"></i>

</li>

<li>
<a href="buyer-messages.html">

</li>

onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

Logout
</a>
</li>

</ul>

</aside>

<main class="main-content">




<div class="page">

<div class="page-header">

<div>

<h1>
Saved Vegetables
</h1>

<p>
Your favourite vegetables from farmers
</p>

</div>

<div class="search-box">

<i class="fa-solid fa-search"></i>

<input
type="text"
id="searchInput"
placeholder=
"Search wishlist...">

</div>

</div>


<!-- WISHLIST -->

<div
class="row"
id="wishlistContainer">

Loading...

</div>

</div>

<script>

// ======================
// LOGIN CHECK
// ======================

const loggedBuyer =

JSON.parse(
localStorage.getItem(
"buyer"
)
);

if(
!loggedBuyer
){

window.location.href =
"./buyer-login.html";

}


// ======================
// LOAD WISHLIST
// ======================

async function
loadWishlist(){

try{

const response =
await fetch(

`https://farm2hotel.onrender.com/api/wishlist/${loggedBuyer.id}`

);

const wishlist =
await response.json();

console.log(
"Wishlist:",
wishlist
);

let html = "";


// ======================
// EMPTY WISHLIST
// ======================

if(
wishlist.length === 0
){

html =
`
<div class=
"col-12">

<div class=
"empty-box">

<i class=
"fa-solid fa-heart-crack">

</i>

<h2 class=
"fw-bold">

Wishlist Empty

</h2>

<p class=
"text-muted mt-2">

Save your favourite
vegetables here ❤️

</p>

<button
class=
"btn btn-success rounded-pill px-5 py-3 mt-4"

onclick=
"window.location.href='browse-market.html'">

Browse Market

</button>

</div>

</div>
`;

document
.getElementById(
"wishlistContainer"
)
.innerHTML =
html;

return;

}


// ======================
// PRODUCT CARD
// ======================

wishlist.forEach(item=>{

html +=
`
<div class=
"col-lg-4
col-md-6
mb-4">

<div class=
"product-card">

<img
src=
"https://farm2hotel.onrender.com/uploads/${item.image}"

class=
"product-image"

onerror=
"this.src='https://via.placeholder.com/400x250?text=No+Image'">

<div class=
"product-content">

<h3 class=
"product-title">

${item.vegetable_name}

</h3>

<p class=
"product-category">

${item.category || "Fresh Vegetable"}

</p>

<h3 class=
"product-price">

₹${item.price}/KG

</h3>


<span class=
"stock-badge
${item.quantity < 20
? "low-stock"
: "in-stock"}">

${item.quantity < 20
? "⚠️ Low Stock"
: "✅ In Stock"}

</span>



<div class=
"action-buttons">

<button
class=
"cart-btn"

onclick=
"addToCart(
${item.vegetable_id},
${item.farmer_id},
${item.price}
)">

🛒 Add Cart

</button>

<button
class=
"remove-btn"

onclick=
"removeWishlist(${item.id})">

❤️ Remove

</button>

</div>

</div>

</div>

</div>
`;

});


document
.getElementById(
"wishlistContainer"
)
.innerHTML =
html;

}
catch(error){

console.log(
"Wishlist Error:",
error
);

}

}


// ======================
// ADD TO CART
// ======================

async function
addToCart(

vegetableId,
farmerId,
price

){

try{

const response =
await fetch(

"https://farm2hotel.onrender.com/api/cart/add",

{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify({

buyer_id:
loggedBuyer.id,

vegetable_id:
vegetableId,

farmer_id:
farmerId,

quantity:1,

price_per_kg:
price,

total_amount:
price

})

}

);

const data =
await response.json();

alert(
data.message
);

}
catch(error){

console.log(
"Cart Error:",
error
);

}

}


// ======================
// REMOVE WISHLIST
// ======================

async function
removeWishlist(id){

const confirmDelete =
confirm(
"Remove from wishlist?"
);

if(
!confirmDelete
)
return;

try{

const response =
await fetch(

`https://farm2hotel.onrender.com/api/wishlist/delete/${id}`,

{
method:"DELETE"
}

);

const data =
await response.json();

alert(
data.message
);

loadWishlist();

}
catch(error){

console.log(
"Remove Error:",
error
);

}

}


// ======================
// SEARCH
// ======================

document
.getElementById(
"searchInput"
)

.addEventListener(

"keyup",

function(){

const value =
this.value
.toLowerCase();

const cards =
document
.querySelectorAll(
".col-lg-4"
);

cards.forEach(card=>{

const text =
card.innerText
.toLowerCase();

card.style.display =

text.includes(value)

?

"block"

:

"none";

});

}

);


// ======================
// PAGE LOAD
// ======================

window.onload =
function(){

loadWishlist();

};

</script>

</body>
</html>
