<!-- MAIN CONTENT -->
<div class="main-content">

<div class="container py-5">
        <div class="d-flex justify-content-between mb-4">
            <h2>
                👨‍🌾 Farmer Profile
            </h2>

            <a href="farmer-dashboard.html"
                class="btn btn-dark">
                ← Dashboard
            </a>
        </div>

        <div class="profile-card">

            <div class="row">

                <!-- LEFT -->
                <div class="col-md-4">

                    <div class="profile-img-box">

                        <img id="profilePreview"
                            src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                            class="profile-img">

                        <input type="file"
                            id="profileImage"
                            class="form-control upload-btn">

                    </div>

                </div>


                <!-- RIGHT -->
                <div class="col-md-8">

                    <h4 class="section-title">
                        Personal Information
                    </h4>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label>Name</label>

                            <input type="text"
                                id="full_name"
                                class="form-control">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Mobile</label>

                            <input type="text"
                                id="mobile"
                                class="form-control">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Village</label>

                            <input type="text"
                                id="village"
                                class="form-control">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>District</label>

                            <input type="text"
                                id="district"
                                class="form-control">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>State</label>

                            <input type="text"
                                id="state"
                                class="form-control">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Pincode</label>

                            <input type="text"
                                id="pincode"
                                class="form-control">
                        </div>

                    </div>


                    <h4 class="section-title mt-3">
                        Farm Information
                    </h4>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label>Farm Name</label>

                            <input type="text"
                                id="farm_name"
                                class="form-control">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Farm Size</label>

                            <input type="text"
                                id="farm_size"
                                class="form-control">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Farm Type</label>

                            <input type="text"
                                id="farm_type"
                                class="form-control"
                                placeholder="Organic / Vegetables">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Experience</label>

                            <input type="number"
                                id="experience"
                                class="form-control">
                        </div>

                        <div class="col-12 mb-3">
                            <label>Bio</label>

                            <textarea
                                id="bio"
                                class="form-control"
                                rows="4"></textarea>
                        </div>

                    </div>

                    <button
                        onclick="updateProfile()"
                        class="btn btn-success w-100 save-btn">

                        Save Profile
                    </button>

                </div>

            </div>

        </div>

    </div>


    <script>

        const farmer =
            JSON.parse(
                localStorage.getItem("farmer")
            );

        const farmerId =
            farmer.id;


        // LOAD PROFILE
        async function loadProfile() {

            const res =
                await fetch(
                    `http://farm2hotel.onrender.com/api/farmers/profile/${farmerId}`
                );

            const data =
                await res.json();

            document.getElementById(
                "full_name"
            ).value =
                data.full_name || "";

            document.getElementById(
                "mobile"
            ).value =
                data.mobile || "";

            document.getElementById(
                "village"
            ).value =
                data.village || "";

            document.getElementById(
                "district"
            ).value =
                data.district || "";

            document.getElementById(
                "state"
            ).value =
                data.state || "";

            document.getElementById(
                "pincode"
            ).value =
                data.pincode || "";

            document.getElementById(
                "farm_name"
            ).value =
                data.farm_name || "";

            document.getElementById(
                "farm_size"
            ).value =
                data.farm_size || "";

            document.getElementById(
                "farm_type"
            ).value =
                data.farm_type || "";

            document.getElementById(
                "experience"
            ).value =
                data.experience || "";

            document.getElementById(
                "bio"
            ).value =
                data.bio || "";

            if (data.profile_image) {

                document.getElementById(
                    "profilePreview"
                ).src =
                    data.profile_image;
            }
        }


        // IMAGE PREVIEW
        document.getElementById(
            "profileImage"
        ).addEventListener(
            "change",
            function () {

                const file =
                    this.files[0];

                const reader =
                    new FileReader();

                reader.onload =
                    function () {

                        document
                            .getElementById(
                                "profilePreview"
                            ).src =
                            reader.result;
                    }

                reader.readAsDataURL(file);
            }
        );


        // UPDATE PROFILE
        async function updateProfile() {

            const profile_image =
                document.getElementById(
                    "profilePreview"
                ).src;

            const body = {

                full_name:
                    document.getElementById(
                        "full_name"
                    ).value,

                mobile:
                    document.getElementById(
                        "mobile"
                    ).value,

                village:
                    document.getElementById(
                        "village"
                    ).value,

                district:
                    document.getElementById(
                        "district"
                    ).value,

                state:
                    document.getElementById(
                        "state"
                    ).value,

                pincode:
                    document.getElementById(
                        "pincode"
                    ).value,

                farm_name:
                    document.getElementById(
                        "farm_name"
                    ).value,

                farm_size:
                    document.getElementById(
                        "farm_size"
                    ).value,

                farm_type:
                    document.getElementById(
                        "farm_type"
                    ).value,

                experience:
                    document.getElementById(
                        "experience"
                    ).value,

                bio:
                    document.getElementById(
                        "bio"
                    ).value,

                profile_image
            };

            const res =
                await fetch(
                    `http://farm2hotel.onrender.com/api/farmers/profile/${farmerId}`,
                    {
                        method: "PUT",

                        headers: {
                            "Content-Type":
                                "application/json"
                        },

                        body:
                            JSON.stringify(body)
                    }
                );

            const data =
                await res.json();

            alert(data.message);
        }

        loadProfile();

    </script>
