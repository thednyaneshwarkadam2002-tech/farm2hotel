<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content=
"width=device-width, initial-scale=1.0">

<title>
Farm2Hotel | My Orders
</title>

<link
href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href=
"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link
href=
"https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fb;
overflow-x:hidden;
}


/* TOPBAR */

.topbar{

background:#fff;

padding:22px 40px;

display:flex;
justify-content:space-between;
align-items:center;

box-shadow:
0 10px 30px
rgba(0,0,0,.05);

position:sticky;
top:0;
z-index:999;
}

.logo{

font-size:30px;
font-weight:700;
color:#198754;
}

.back-btn{

border:none;

background:
linear-gradient(
135deg,
#198754,
#157347
);

color:#fff;

padding:14px 26px;

border-radius:50px;

font-weight:600;

transition:.3s;
}

.back-btn:hover{
transform:translateY(-2px);
}


/* PAGE */

.page{
padding:30px;
}

.page-header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:30px;
}

.page-header h1{

font-size:42px;
font-weight:700;
}

.page-header p{
color:#666;
margin-top:10px;
}


/* SEARCH */

.search-box{

position:relative;

max-width:400px;
width:100%;
}

.search-box i{

position:absolute;

left:20px;
top:50%;

transform:
translateY(-50%);

color:#777;
}

.search-box input{

width:100%;

border:none;
outline:none;

background:#fff;

padding:
18px
20px
18px
55px;

border-radius:20px;

box-shadow:
0 10px 30px
rgba(0,0,0,.05);
}


/* STATS */

.stats-grid{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:20px;

margin-bottom:35px;
}

.stat-card{

background:#fff;

padding:30px;

border-radius:30px;

box-shadow:
0 10px 30px
rgba(0,0,0,.05);

transition:.3s;
}

.stat-card:hover{

transform:
translateY(-5px);
}

.stat-card i{

font-size:28px;
color:#198754;

margin-bottom:18px;
}

.stat-card h2{

font-size:36px;
font-weight:700;
}

.stat-card p{
margin:0;
color:#777;
}


/* ORDER CARD */

.order-card{

background:#fff;

padding:30px;

border-radius:35px;

box-shadow:
0 10px 30px
rgba(0,0,0,.05);

margin-bottom:25px;

transition:.3s;
}

.order-card:hover{

transform:
translateY(-6px);
}

.order-top{

display:flex;
justify-content:space-between;
align-items:center;

flex-wrap:wrap;
gap:15px;
}

.order-id{

font-size:15px;
color:#777;
}

.order-title{

font-size:28px;
font-weight:700;
}

.order-price{

font-size:28px;
font-weight:700;
color:#198754;
}

.order-info{

margin-top:20px;

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:20px;
}

.info-box{

background:#f4f7fb;

padding:18px;

border-radius:20px;
}

.info-box small{
color:#777;
}

.info-box h6{
margin-top:8px;
font-weight:600;
}


/* BADGES */

.status{

padding:10px 22px;

border-radius:50px;

font-size:14px;
font-weight:600;
}

.pending{

background:#fff3cd;
color:#856404;
}

.accepted{

background:#d1e7dd;
color:#0f5132;
}

.rejected{

background:#f8d7da;
color:#842029;
}


/* EMPTY */

.empty-orders{

background:#fff;

padding:80px;

border-radius:35px;

text-align:center;

box-shadow:
0 10px 30px
rgba(0,0,0,.05);
}

.empty-orders i{

font-size:70px;

color:#198754;

margin-bottom:20px;
}


/* MOBILE */

@media(max-width:992px){

.page{
padding:20px;
}

.stats-grid{

grid-template-columns:1fr;
}

.order-info{

grid-template-columns:
repeat(2,1fr);
}

.page-header h1{
font-size:30px;
}

}

@media(max-width:576px){

.order-info{
grid-template-columns:1fr;
}

.topbar{
padding:20px;
}

}

/* DASHBOARD */

.dashboard{
display:flex;
min-height:100vh;
}


/* SIDEBAR */

.sidebar{

width:290px;

background:
linear-gradient(
180deg,
#198754,
#0f5132
);

padding:30px 20px;

position:fixed;

height:100vh;

overflow-y:auto;

color:#fff;

z-index:999;
}

.logo-box{
margin-bottom:40px;
}

.logo-box h2{
font-size:34px;
font-weight:700;
}

.logo-box p{
opacity:.8;
font-size:14px;
}

.menu{
list-style:none;
padding:0;
}

.menu li{
margin-bottom:10px;
}

.menu a{

display:flex;
align-items:center;
gap:14px;

padding:16px 18px;

border-radius:18px;

text-decoration:none;
color:#fff;

font-size:16px;
font-weight:500;

transition:.3s;
}

.menu a:hover,
.menu .active{

background:
rgba(255,255,255,.15);

}

.menu i{
font-size:18px;
}


/* MAIN CONTENT */

.main-content{

margin-left:290px;

width:calc(100% - 290px);
}


/* MOBILE */

@media(max-width:992px){

.sidebar{
display:none;
}

.main-content{
margin-left:0;
width:100%;
}

}

</style>

</head>

<body>

    <div class="dashboard">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo-box">

<h2>
🌱 Farm2Hotel
</h2>

<p>
Premium Buyer Panel
</p>

</div>

<ul class="menu">

<li>
<a href="buyer-dashboard.html">
<i class="fa-solid fa-house"></i>
Dashboard
</a>
</li>

<li>

</li>

<li>

</li>

<li>
<a href="my-orders.html"
class="active">

<i class="fa-solid fa-box"></i>

My Orders
</a>
</li>

<li>
<a href="nearby-farmers.html">
<i class="fa-solid fa-location-dot"></i>
Nearby Farmers
</a>
</li>

<li>
<a href="wishlist.html">
<i class="fa-solid fa-heart"></i>
Wishlist
</a>
</li>

<li>

</li>

<li>

</li>

Profile

onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

Logout
</a>
</li>

</ul>

</aside>

<main class="main-content">






<div class="page">

<div class="page-header">

<div>

<h1>
📦 My Orders
</h1>

<p>
Track all your vegetable orders
</p>

</div>

<div class="search-box">

<i class="fa-solid fa-search"></i>

<input
type="text"
id="searchInput"
placeholder=
"Search orders...">

</div>

</div>


<!-- STATS -->

<div class="stats-grid">

<div class="stat-card">

<i class="fa-solid fa-box"></i>

<h2 id="totalOrders">

0

</h2>

<p>
Total Orders
</p>

</div>


<div class="stat-card">

<i class="fa-solid fa-truck-fast"></i>

<h2 id="activeOrders">

0

</h2>

<p>
Active Orders
</p>

</div>


<div class="stat-card">

<i class="fa-solid fa-indian-rupee-sign"></i>

<h2>

₹<span id="totalSpent">

0

</span>

</h2>

<p>
Total Spend
</p>

</div>

</div>


<!-- ORDER LIST -->

<div id="ordersContainer">

Loading...

</div>

</div>

<script>

// ======================
// LOGIN CHECK
// ======================

const loggedBuyer =

JSON.parse(
localStorage.getItem(
"buyer"
)
);

if(
!loggedBuyer
){

window.location.href =
"./buyer-login.html";

}


// ======================
// LOAD ORDERS
// ======================

async function
loadOrders(){

try{

const response =
await fetch(

`http://farm2hotel.onrender.com/api/orders/buyer/${loggedBuyer.id}`

);

const orders =
await response.json();

console.log(
"Buyer Orders:",
orders
);

let html = "";

let totalSpent = 0;

let activeOrders = 0;


// ======================
// EMPTY ORDER
// ======================

if(
orders.length === 0
){

html =
`
<div class=
"empty-orders">

<i class=
"fa-solid fa-box-open">

</i>

<h2 class=
"fw-bold">

No Orders Yet

</h2>

<p class=
"text-muted mt-2">

Start shopping fresh
vegetables from farmers

</p>

<button
class=
"btn btn-success rounded-pill px-5 py-3 mt-4"

onclick=
"window.location.href='browse-market.html'">

Browse Market

</button>

</div>
`;

document
.getElementById(
"ordersContainer"
)
.innerHTML =
html;

return;

}


// ======================
// ORDER CARD
// ======================

orders.forEach(order=>{

let statusClass =
"pending";

if(
order.order_status
=== "Accepted"
){

statusClass =
"accepted";

activeOrders++;

}

if(
order.order_status
=== "Rejected"
){

statusClass =
"rejected";

}

const amount =

parseFloat(
order.total_amount || 0
);

totalSpent +=
amount;


html +=
`
<div class=
"order-card">

<div class=
"order-top">

<div>

<p class=
"order-id">

Order #${order.id}

</p>

<h2 class=
"order-title">

🥬
${order.vegetable_name}

</h2>

<p class=
"text-muted">

Ordered from
<b>

${order.farmer_name || "Farmer"}

</b>

</p>

</div>


<div class=
"text-end">

<h2 class=
"order-price">

₹${amount}

</h2>

<span
class=
"status ${statusClass}">

${order.order_status}

</span>

</div>

</div>



<div class=
"order-info">

<div class=
"info-box">

<small>
Quantity
</small>

<h6>

${order.quantity}
KG

</h6>

</div>


<div class=
"info-box">

<small>
Payment
</small>

<h6>

${order.payment_method || "COD"}

</h6>

</div>


<div class=
"info-box">

<small>
Delivery
</small>

<h6>

${order.delivery_address || "Address"}

</h6>

</div>


<div class=
"info-box">

<small>
Order Date
</small>

<h6>

${new Date(
order.created_at
).toLocaleDateString()}

</h6>

</div>

</div>

</div>
`;

});


// ======================
// HTML
// ======================

document
.getElementById(
"ordersContainer"
)
.innerHTML =
html;


// ======================
// STATS
// ======================

document
.getElementById(
"totalOrders"
)
.innerText =

orders.length;


document
.getElementById(
"activeOrders"
)
.innerText =

activeOrders;


document
.getElementById(
"totalSpent"
)
.innerText =

totalSpent.toFixed(2);

}
catch(error){

console.log(
"Order Error:",
error
);

}

}


// ======================
// SEARCH ORDER
// ======================

document
.getElementById(
"searchInput"
)

.addEventListener(

"keyup",

function(){

const value =
this.value
.toLowerCase();

const cards =
document
.querySelectorAll(
".order-card"
);

cards.forEach(card=>{

const text =
card.innerText
.toLowerCase();

card.style.display =

text.includes(value)

?

"block"

:

"none";

});

}

);


// ======================
// PAGE LOAD
// ======================

window.onload =
function(){

loadOrders();

};

</script>

</body>
</html>
