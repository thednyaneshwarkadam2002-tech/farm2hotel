rgba(0,0,0,.08);

translateY(-50%);

border-radius:30px;

overflow:hidden;

transition:.3s;

}

.veg-card:hover{

translateY(-8px);

}

.stock-good{

}

.stock-low{

font-weight:600;
}

.action-btn{
border:none;
padding:12px;
border-radius:14px;
font-weight:600;
width:100%;
transition:.3s;
}

.edit-btn{
background:#ffc107;
}

.delete-btn{
background:#dc3545;
color:#fff;
}

.action-btn:hover{
transform:scale(1.03);
}

/* EMPTY */

.empty-box{

background:#fff;

padding:60px;

border-radius:30px;

text-align:center;

box-shadow:
0 10px 30px
rgba(0,0,0,.05);

<script>

// ==========================
// LOGIN CHECK
// ==========================

const loggedFarmer =
JSON.parse(
localStorage.getItem(
"farmer"
)
);

if(!loggedFarmer){

window.location.href =
"./farmer-login.html";

}


// ==========================
// LOAD VEGETABLES
// ==========================

async function
loadVegetables(){

try{

const response =
await fetch(

"http://farm2hotel.onrender.com/api/vegetables"

);

const vegetables =
await response.json();

const myVegetables =
vegetables.filter(

veg =>

veg.farmer_id ==
loggedFarmer.id

);

let html = "";

if(
myVegetables.length
=== 0
){

html =
`
<div class="col-12">

<div class="empty-box">

<i class=
"fa-solid fa-seedling">
</i>

<h3>
No Vegetables Added
</h3>

<p class="text-muted">

Start selling by
adding vegetables

</p>

<a
href="./add-vegetables.html"
class=
"btn btn-success mt-3 px-4">

Add Vegetable

</a>

</div>

</div>
`;

}

myVegetables
.forEach(veg=>{

html +=
`
<div class=
"col-lg-4
col-md-6
mb-4">

<div class=
"veg-card">

<img
src=
"http://farm2hotel.onrender.com/uploads/${veg.image}"

onerror=
"this.src='https://via.placeholder.com/400x250?text=No+Image'">

<div class=
"veg-content">

<h3>

${veg.vegetable_name}

</h3>

<p class=
"text-muted">

${veg.category}

</p>

<div class=
"price mb-2">

₹${veg.price}/KG

</div>

<p>

Stock:
<b>

${veg.quantity}
KG

</b>

</p>

${
veg.quantity < 20

?

`<p class=
"stock-low">

⚠️ Low Stock

</p>`

:

`<p class=
"stock-good">

✅ Available

</p>`

}

<div class=
"d-flex gap-2 mt-3">

<button
class=
"action-btn edit-btn"

onclick=
"editVegetable(${veg.id})">

Edit

</button>

<button
class=
"action-btn delete-btn"

onclick=
"deleteVegetable(${veg.id})">

Delete

</button>

</div>

</div>

</div>

</div>
`;

});

document
.getElementById(
"vegetableList"
)
.innerHTML =
html;

}
catch(error){

console.log(error);

}

}


// ==========================
// SEARCH
// ==========================

document
.getElementById(
"searchInput"
)

.addEventListener(

"keyup",

function(){

const value =
this.value
.toLowerCase();

const cards =
document
.querySelectorAll(
".veg-card"
);

cards.forEach(card=>{

const text =
card.innerText
.toLowerCase();

card.parentElement
.style.display =

text.includes(value)

?

"block"

:

"none";

});

}

);


// ==========================
// DELETE
// ==========================

async function
deleteVegetable(id){

const confirmDelete =
confirm(
"Delete Vegetable?"
);

if(!confirmDelete)
return;

try{

await fetch(

`http://farm2hotel.onrender.com/api/vegetables/delete/${id}`,

{
method:"DELETE"
}

);

loadVegetables();

}
catch(error){

console.log(error);

}

}


// ==========================
// EDIT
// ==========================

async function
editVegetable(id){

const newPrice =
prompt(
"Enter New Price"
);

if(!newPrice)
return;

const newQuantity =
prompt(
"Enter New Quantity"
);

if(!newQuantity)
return;

try{

await fetch(

`http://farm2hotel.onrender.com/api/vegetables/update/${id}`,

{

method:"PUT",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify({

price:
newPrice,

quantity:
newQuantity

})

}

);

loadVegetables();

}
catch(error){

console.log(error);

}

}


// ==========================
// PAGE LOAD
// ==========================

window.onload =
function(){

loadVegetables();

};

</script>
