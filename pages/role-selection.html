<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Select Role - Farm2Hotel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<section class="role-section">

    <div class="container">

        <div class="text-center mb-5">

            <h1 class="role-title">
                Join Farm2Hotel
            </h1>

            <p class="role-subtitle">
                Select how you want to join our platform
            </p>

        </div>

        <div class="row justify-content-center g-4">

            <!-- Farmer -->
            <div class="col-lg-4 col-md-6">
                <div class="role-card">

                    <div class="role-icon farmer-icon">
                        <i class="fas fa-tractor"></i>
                    </div>

                    <h3>Farmer</h3>

                    <p>
                        Sell vegetables directly to
                        hotels and restaurants.
                    </p>

                    <a href="farmer-register.html"
                       class="btn btn-success w-100">

                        Continue as Farmer
                    </a>

                </div>
            </div>

            <!-- Restaurant -->
            <div class="col-lg-4 col-md-6">
                <div class="role-card">

                    <div class="role-icon restaurant-icon">
                        <i class="fas fa-utensils"></i>
                    </div>

                    <h3>Restaurant</h3>

                    <p>
                        Buy fresh vegetables in
                        bulk directly from farmers.
                    </p>

                    <a href="restaurant-register.html"
                       class="btn btn-dark w-100">

                        Continue as Restaurant
                    </a>

                </div>
            </div>

        </div>

        <div class="text-center mt-5">
            <a href="../index.html"
               class="back-home">

                ← Back to Home
            </a>
        </div>

    </div>

</section>

</body>
</html>
