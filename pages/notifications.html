<title>

<link

"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fb;
}

.wrapper{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:35px;
flex-wrap:wrap;
gap:15px;
}

.heading h1{
font-size:42px;
font-weight:700;
margin:0;
}

.heading p{
color:#777;
margin:0;
}

.back-btn{
background:#111;
color:#fff;
padding:14px 22px;
border-radius:14px;
text-decoration:none;
font-weight:600;
}

.notification-card{
background:#fff;
padding:25px;
border-radius:25px;
margin-bottom:18px;
display:flex;
gap:20px;
align-items:flex-start;
box-shadow:
0 10px 30px
rgba(0,0,0,.05);

transition:.3s;
cursor:pointer;
}

.notification-card:hover{
transform:translateY(-3px);
}

.notification-card.unread{
border-left:
6px solid #198754;
background:#f7fff9;
}

.icon-box{
width:65px;
height:65px;
border-radius:18px;
background:#eefaf2;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
color:#198754;
}

.notification-content{
flex:1;
}

.notification-content h5{
margin:0;
font-size:20px;
font-weight:700;
}

.notification-content p{
margin:8px 0;
color:#666;
}

.time{
font-size:14px;
color:#999;
}

.badge-new{
background:#198754;
color:#fff;
padding:8px 14px;
border-radius:30px;
font-size:13px;
font-weight:600;
}

.empty{
text-align:center;
padding:100px 20px;
background:#fff;
border-radius:30px;
box-shadow:
0 10px 30px
rgba(0,0,0,.05);
}

.empty i{
font-size:70px;
color:#198754;
margin-bottom:20px;
}

.empty h3{
font-weight:700;
}

/* SIDEBAR */

.sidebar{

width:280px;

background:
linear-gradient(
180deg,
#198754,
#0f5132
);

color:#fff;

padding:30px 20px;

position:fixed;

left:0;
top:0;

height:100vh;

overflow-y:auto;

z-index:999;

}

.logo-box{
margin-bottom:40px;
}

.logo-box h2{
font-weight:700;
font-size:32px;
color:#fff;
}

.logo-box p{
opacity:.8;
margin-top:8px;
color:#fff;
}

.sidebar-menu{
list-style:none;
padding:0;
}

.sidebar-menu li{
margin-bottom:12px;
}

.sidebar-menu a{

display:flex;
align-items:center;
gap:14px;

text-decoration:none;

padding:16px 18px;

border-radius:18px;

color:#fff;

transition:.3s;

font-size:16px;
font-weight:500;

}

.sidebar-menu a:hover,
.sidebar-menu a.active{

background:
rgba(255,255,255,.15);

}

.sidebar-menu i{
font-size:18px;
}


/* PAGE LAYOUT */

.dashboard-wrapper{
display:flex;
}

.main-content{

margin-left:280px;

width:calc(100% - 280px);

padding:30px;

}

.wrapper{
max-width:1100px;
margin:auto;
padding:20px;
}
</style>

</head>

<body>

<aside class="sidebar">

<div class="logo-box">

<h2>
🌱 Farm2Hotel
</h2>

<p>
Farmer Dashboard
</p>

</div>

<ul class="sidebar-menu">

<li>

<i class="fa-solid fa-house"></i>

<li>

</li>

<li>

<li>

<i class="fa-solid fa-cart-shopping"></i>
Orders

</li>

<li>
<a href="analytics.html">

<i class="fa-solid fa-chart-column"></i>
Analytics

</a>
</li>

<li>
<a href="nearby-hotels.html">

<i class="fa-solid fa-location-dot"></i>
Nearby Hotels

</li>

<li>
<a href="revenue.html">

</li>

Logout

<div class="main-content">

<div class="wrapper">

<div class="top-bar">

<div class="heading">

    

<h1>
Notifications 🔔
</h1>

<p>
Real-time order & message updates
</p>

</div>

<a
href=
"farmer-dashboard.html"
class=
"back-btn">

← Dashboard

</a>

</div>

<div
id=
"notificationList">

</div>

</div>



<script>

// ======================
// LOGIN CHECK
// ======================

const farmer =
JSON.parse(
localStorage.getItem(
"farmer"
)
);

if(!farmer){

window.location.href =
"./farmer-login.html";

}


// ======================
// LOAD NOTIFICATIONS
// ======================

async function
loadNotifications(){

try{

const response =
await fetch(

`http://farm2hotel.onrender.com/api/notifications/${farmer.id}`

);

const data =
await response.json();

let html = "";

if(
data.length === 0
){

html =
`
<div class="empty">

<i class=
"fa-solid fa-bell-slash">
</i>

<h3>
No Notifications Yet
</h3>

<p>
Orders & messages will appear here
</p>

</div>
`;

}

data.forEach(item=>{

const unread =

item.is_read == 0

?

"unread"

:

"";

const icon =

item.type ===
"Order"

?

"fa-cart-shopping"

:

"fa-message";

html +=
`
<div
class=
"notification-card ${unread}"

onclick=
"markRead(
${item.id}
)">

<div class=
"icon-box">

<i class=
"fa-solid ${icon}">
</i>

</div>

<div class=
"notification-content">

<h5>
${item.title}
</h5>

<p>
${item.message}
</p>

<span class=
"time">

${new Date(
item.created_at
).toLocaleString()}

</span>

</div>

${
item.is_read == 0

?

`<span class=
"badge-new">
NEW
</span>`

:

""
}

</div>
`;

});

document
.getElementById(
"notificationList"
)
.innerHTML =
html;

}
catch(error){

console.log(error);

}

}


// ======================
// MARK READ
// ======================

async function
markRead(id){

try{

await fetch(

`http://farm2hotel.onrender.com/api/notifications/read/${id}`,

{
method:"PUT"
}

);

loadNotifications();

}
catch(error){

console.log(error);

}

}


// ======================
// AUTO REFRESH
// ======================

setInterval(()=>{

loadNotifications();

},5000);


// ======================
// PAGE LOAD
// ======================

window.onload =
function(){

loadNotifications();

};

</script>

</div>
</div>

</body>
