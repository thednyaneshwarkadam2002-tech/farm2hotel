<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Buyer Registration | Farm2Hotel
</title>

<link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href=
"https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href=
"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#edf5ef;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

padding:30px;

}

.register-card{

width:100%;
max-width:1050px;

background:#fff;

border-radius:35px;

overflow:hidden;

display:flex;

box-shadow:
0 20px 60px
rgba(0,0,0,.08);

}

.left-side{

width:42%;

background:
linear-gradient(
180deg,
#198754,
#0f5132
);

padding:60px 45px;

color:#fff;

display:flex;
flex-direction:column;
justify-content:center;

}

.left-side h1{

font-size:52px;
font-weight:700;

margin-bottom:20px;

}

.left-side p{

font-size:18px;
opacity:.9;

line-height:1.8;

}

.feature{

margin-top:40px;
}

.feature p{

margin-bottom:18px;
font-size:18px;

}

.right-side{

width:58%;
padding:50px;

}

.heading{

font-size:42px;
font-weight:700;

text-align:center;

}

.sub-heading{

text-align:center;
color:#777;

margin-bottom:30px;

}

.progress{

height:10px;
border-radius:20px;

margin-bottom:35px;

}

.progress-bar{
background:#198754;
}

.form-control,
.form-select{

height:58px;

border-radius:16px;

padding:15px;

}

.form-label{
font-weight:600;
}

.next-btn{

border:none;

background:
linear-gradient(
135deg,
#198754,
#157347
);

color:#fff;

padding:15px 30px;

border-radius:18px;

font-weight:700;

float:right;

}

.password-box{
position:relative;
}

.password-box i{

position:absolute;
right:18px;
top:20px;

cursor:pointer;
color:#777;

}

@media(max-width:992px){

.register-card{
flex-direction:column;
}

.left-side,
.right-side{
width:100%;
}

.left-side{
padding:40px;
}

.left-side h1{
font-size:38px;
}

.heading{
font-size:32px;
}

}

</style>

</head>

<body>

<div class="register-card">

<!-- LEFT -->

<div class="left-side">

<h1>
Farm2Hotel
</h1>

<p>

Connect your hotel or restaurant
directly with farmers for fresh
daily vegetable supply.

</p>

<div class="feature">

<p>✅ Direct Farmer Purchase</p>

<p>✅ Daily Fresh Supply</p>

<p>✅ Trusted Verified Farmers</p>

<p>✅ Best Wholesale Price</p>

</div>

</div>


<!-- RIGHT -->

<div class="right-side">

<h2 class="heading">

Buyer Registration

</h2>

<p class="sub-heading">

Join Farm2Hotel as Buyer

</p>

<div class="progress">

<div class=
"progress-bar"
style="width:50%">
</div>

</div>

<form id="buyerForm">

<div class="row">

<div class="col-md-6 mb-3">

<label class=
"form-label">

Owner Name

</label>

<input
type="text"
id="ownerName"
class=
"form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class=
"form-label">

Mobile Number

</label>

<input
type="tel"
id="mobile"

class=
"form-control"

maxlength="10"

required>

</div>

<div class="col-md-6 mb-3">

<label class=
"form-label">

Business Name

</label>

<input
type="text"
id="businessName"
class=
"form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class=
"form-label">

Business Type

</label>

<select
id="businessType"
class=
"form-select"
required>

<option value="">
Select Type
</option>

<option>
Hotel
</option>

<option>
Restaurant
</option>

<option>
Catering
</option>

<option>
Mess
</option>

<option>
Retail Shop
</option>

</select>

</div>
<div class="col-md-6 mb-3">

<label class=
"form-label">

Email

</label>

<input
type="email"
id="email"
class=
"form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class=
"form-label">

Aadhaar Number

</label>

<input
type="text"
id="aadhaar"

class=
"form-control"

maxlength="12"

required>

</div>

<div class="col-md-6 mb-3">

<label class=
"form-label">

Password

</label>

<div class=
"password-box">

<input
type="password"
id="password"

class=
"form-control"
required>

<i class=
"fa-solid fa-eye"
onclick=
"togglePassword(
'password',
this
)">
</i>

</div>

</div>

<div class="col-md-6 mb-3">

<label class=
"form-label">

Confirm Password

</label>

<div class=
"password-box">

<input
type="password"
id="confirmPassword"

class=
"form-control"
required>

<i class=
"fa-solid fa-eye"
onclick=
"togglePassword(
'confirmPassword',
this
)">
</i>

</div>

</div>

<div class="col-md-6 mb-3">

<label class=
"form-label">

GST Number
(Optional)

</label>

<input
type="text"
id="gst"

class=
"form-control">

</div>

<div class="col-md-6 mb-3">

<label class=
"form-label">

City

</label>

<input
type="text"
id="city"

class=
"form-control"
required>

</div>

<div class="col-12 mb-4">

<label class=
"form-label">

Business Address

</label>

<textarea
id="address"

class=
"form-control"

style="
height:120px;
border-radius:16px;
"
required>

</textarea>

</div>

<div class="col-12">

<button
type="submit"
class=
"next-btn">

Register →
</button>

</div>

</div>

</form>

</div>

</div>

<script>

// =====================
// SHOW/HIDE PASSWORD
// =====================

function togglePassword(
id,
icon
){

const input =
document.getElementById(id);

if(
input.type ===
"password"
){

input.type =
"text";

icon.classList.remove(
"fa-eye"
);

icon.classList.add(
"fa-eye-slash"
);

}
else{

input.type =
"password";

icon.classList.remove(
"fa-eye-slash"
);

icon.classList.add(
"fa-eye"
);

}

}


// =====================
// FORM SUBMIT
// =====================

document
.getElementById(
"buyerForm"
)
.addEventListener(
"submit",

async function(e){

e.preventDefault();


// GET VALUES

const owner_name =

document
.getElementById(
"ownerName"
).value.trim();

const mobile =

document
.getElementById(
"mobile"
).value.trim();

const business_name =

document
.getElementById(
"businessName"
).value.trim();

const business_type =

document
.getElementById(
"businessType"
).value;

const email =

document
.getElementById(
"email"
).value.trim();

const aadhaar =

document
.getElementById(
"aadhaar"
).value.trim();

const password =

document
.getElementById(
"password"
).value;

const confirmPassword =

document
.getElementById(
"confirmPassword"
).value;

const gst =

document
.getElementById(
"gst"
).value.trim();

const city =

document
.getElementById(
"city"
).value.trim();

const address =

document
.getElementById(
"address"
).value.trim();


// =====================
// VALIDATION
// =====================

// owner name

if(
owner_name.length < 3
){

alert(
"Owner name minimum 3 letters required"
);

return;

}

// mobile

if(
!/^[6-9]\d{9}$/
.test(mobile)
){

alert(
"Enter valid mobile number"
);

return;

}

// email

if(
!/^\S+@\S+\.\S+$/
.test(email)
){

alert(
"Enter valid email"
);

return;

}

// aadhaar

if(
!/^\d{12}$/
.test(aadhaar)
){

alert(
"Enter valid 12 digit Aadhaar"
);

return;

}

// password

if(
password.length < 8
){

alert(
"Password minimum 8 characters required"
);

return;

}

// password match

if(
password !==
confirmPassword
){

alert(
"Passwords do not match"
);

return;

}

// city

if(
city.length < 2
){

alert(
"Enter valid city"
);

return;

}


// =====================
// API CALL
// =====================

try{

const response =
await fetch(

"https://farm2hotel.onrender.com/api/buyers/register",

{
method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify({

owner_name,
mobile,
business_name,
business_type,
email,
aadhaar,
password,
gst,
city,
address

})

}

);

const data =
await response.json();

if(
response.ok
){

alert(
"Registration Successful ✅"
);

window.location.href =
"./buyer-login.html";

}
else{

alert(
data.message ||
"Registration Failed"
);

}

}
catch(error){

console.log(error);

alert(
"Server Error"
);

}

});

</script>

</body>
</html>
