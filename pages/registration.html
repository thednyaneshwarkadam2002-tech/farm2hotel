<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FarmDirect Registration</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <!-- SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-container">

  <!-- LEFT SIDE -->
  <div class="left-side">

    <h1>
      🌿 Farm<span>Direct</span>
    </h1>

    <p>
      Smart B2B Vegetable Supply Platform
      Connecting Farmers Directly with
      Hotels & Restaurants.
    </p>

  </div>

  <!-- RIGHT SIDE -->
  <div class="right-side">

    <div class="login-title">
      <h2>Create Account 🚀</h2>
      <p>Register to continue</p>
    </div>

    <!-- ROLE -->
    <div class="role-box">

      <div class="role-card active"
      onclick="selectRole(this,'Farmer')">

        👨‍🌾 Farmer

      </div>

      <div class="role-card"
      onclick="selectRole(this,'Hotel')">

        🍽️ Hotel

      </div>

    </div>

    <!-- FORM -->
    <form id="registerForm">

      <!-- Name -->
      <div class="input-box">
        <i class="fa-solid fa-user"></i>

        <input
          type="text"
          id="name"
          class="form-control"
          placeholder="Full Name"
        >
      </div>

      <!-- Mobile -->
      <div class="input-box">
        <i class="fa-solid fa-phone"></i>

        <input
          type="text"
          id="mobile"
          maxlength="10"
          class="form-control"
          placeholder="Mobile Number"
        >
      </div>

      <!-- Email -->
      <div class="input-box">
        <i class="fa-solid fa-envelope"></i>

        <input
          type="email"
          id="email"
          class="form-control"
          placeholder="Email Address"
        >
      </div>

      <!-- Password -->
      <div class="input-box">

        <i class="fa-solid fa-lock"></i>

        <input
          type="password"
          id="password"
          class="form-control"
          placeholder="Password"
        >

        <i
          class="fa-solid fa-eye eye-icon"
          onclick="togglePassword()"
          id="eye"
        ></i>

      </div>

      <!-- Confirm Password -->
      <div class="input-box">
        <i class="fa-solid fa-lock"></i>

        <input
          type="password"
          id="confirmPassword"
          class="form-control"
          placeholder="Confirm Password"
        >
      </div>

      <!-- FARMER FIELDS -->
      <div id="farmerFields">

        <div class="input-box">
          <i class="fa-solid fa-id-card"></i>

          <input
            type="text"
            maxlength="12"
            id="aadhaar"
            class="form-control"
            placeholder="Aadhaar Number"
          >
        </div>

        <div class="input-box">
          <i class="fa-solid fa-seedling"></i>

          <input
            type="text"
            id="farmName"
            class="form-control"
            placeholder="Farm Name"
          >
        </div>

      </div>

      <!-- HOTEL FIELDS -->
      <div
      id="hotelFields"
      style="display:none;">

        <div class="input-box">
          <i class="fa-solid fa-building"></i>

          <input
            type="text"
            id="businessName"
            class="form-control"
            placeholder="Business Name"
          >
        </div>

        <div class="input-box">
          <i class="fa-solid fa-file-invoice"></i>

          <input
            type="text"
            id="gst"
            class="form-control"
            placeholder="GST Number"
          >
        </div>

      </div>

      <!-- Photo -->
      <div class="mb-3">
        <label class="fw-bold">
          Upload Profile Photo
        </label>

        <input
          type="file"
          id="photo"
          class="form-control"
        >
      </div>

      <!-- Register -->
      <button
        class="btn-login"
        type="submit">

        Register

      </button>

      <div class="bottom-links">

        <a href="#">
          Already have account?
        </a>

        <a href="login.html">
          Login
        </a>

      </div>

    </form>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
