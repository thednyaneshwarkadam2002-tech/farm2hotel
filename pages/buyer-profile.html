<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content=
"width=device-width, initial-scale=1.0">

<title>
Farm2Hotel | Profile
</title>

<link
href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href=
"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link
href=
"https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
'Poppins',
sans-serif;
}

body{
background:#f4f7fb;
overflow-x:hidden;
}


/* MAIN */

.main-content{
padding:30px;
}


/* HEADER */

.profile-header{

background:
linear-gradient(
135deg,
#198754,
#157347
);

padding:50px;

border-radius:35px;

color:#fff;

display:flex;
justify-content:space-between;
align-items:center;

flex-wrap:wrap;

margin-bottom:30px;
}

.profile-left{
display:flex;
align-items:center;
gap:25px;
}

.profile-image-box{
position:relative;
}

.profile-image{

width:160px;
height:160px;

border-radius:50%;

object-fit:cover;

border:
5px solid
rgba(255,255,255,.4);
}

.edit-photo{

position:absolute;

bottom:10px;
right:10px;

background:#fff;
color:#198754;

width:45px;
height:45px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

cursor:pointer;

font-size:18px;
}

.profile-header h1{
font-size:40px;
font-weight:700;
}

.profile-header p{
opacity:.9;
}


/* CARD */

.profile-card{

background:#fff;

border-radius:35px;

padding:35px;

box-shadow:
0 10px 30px
rgba(0,0,0,.06);
}

.form-control{

border:none;

background:#f4f7fb;

padding:16px;

border-radius:18px;
}

.form-label{
font-weight:600;
margin-bottom:8px;
}

.save-btn{

background:
linear-gradient(
135deg,
#198754,
#157347
);

border:none;

padding:
16px
30px;

border-radius:50px;

font-size:18px;
font-weight:600;

color:#fff;

width:100%;
}


/* MOBILE */

@media(max-width:768px){

.profile-header{
text-align:center;
justify-content:center;
}

.profile-left{
flex-direction:column;
}

.profile-header h1{
font-size:30px;
}

}

</style>

</head>

<body>

<div class="container py-4">

<!-- HEADER -->

<div class="profile-header">

<div class="profile-left">

<div class="profile-image-box">

<img
id="profilePreview"
src=
"https://ui-avatars.com/api/?name=Farmer&background=198754&color=fff"

class="profile-image">

<label
for="profileInput"
class="edit-photo">

<i class="fa-solid fa-camera"></i>

</label>

<input
type="file"
id="profileInput"
hidden>

</div>

<div>

<h1 id="farmerName">

Loading...

</h1>

<p id="farmerLocation">

Village, District

</p>

</div>

</div>

</div>


<!-- FORM -->

<div class="profile-card">

<h3 class="fw-bold mb-4">

👨‍🌾 Farmer Profile

</h3>

<div class="row g-4">

<div class="col-md-6">

<label class="form-label">

Full Name

</label>

<input
type="text"
id="full_name"
class="form-control">

</div>


<div class="col-md-6">

<label class="form-label">

Mobile Number

</label>

<input
type="text"
id="mobile"
class="form-control">

</div>


<div class="col-md-6">

<label class="form-label">

Village

</label>

<input
type="text"
id="village"
class="form-control">

</div>


<div class="col-md-6">

<label class="form-label">

District

</label>

<input
type="text"
id="district"
class="form-control">

</div>


<div class="col-md-6">

<label class="form-label">

State

</label>

<input
type="text"
id="state"
class="form-control">

</div>


<div class="col-md-6">

<label class="form-label">

Pincode

</label>

<input
type="text"
id="pincode"
class="form-control">

</div>


<div class="col-md-6">

<label class="form-label">

Farm Name

</label>

<input
type="text"
id="farm_name"
class="form-control">

</div>


<div class="col-md-6">

<label class="form-label">

Farm Size

</label>

<input
type="text"
id="farm_size"
class="form-control">

</div>


<div class="col-md-6">

<label class="form-label">

Farm Type

</label>

<input
type="text"
id="farm_type"
class="form-control">

</div>


<div class="col-md-6">

<label class="form-label">

Experience

</label>

<input
type="text"
id="experience"
class="form-control">

</div>


<div class="col-12">

<label class="form-label">

Bio

</label>

<textarea
id="bio"
rows="4"
class="form-control"></textarea>

</div>


<div class="col-12">

<button
class="save-btn"
onclick="updateProfile()">

Save Profile ✅

</button>

</div>

</div>

</div>

</div>

<script>

// ==========================
// LOGIN CHECK
// ==========================

const loggedFarmer =

JSON.parse(
localStorage.getItem(
"farmer"
)
);

if(!loggedFarmer){

window.location.href =
"./farmer-login.html";

}

let profileImageBase64 = "";


// ==========================
// LOAD PROFILE
// ==========================

async function
loadProfile(){

try{

const response =
await fetch(

`https://farm2hotel.onrender.com/api/farmers/profile/${loggedFarmer.id}`

);

const farmer =
await response.json();

console.log(
"Farmer Profile:",
farmer
);


// HEADER

document
.getElementById(
"farmerName"
)
.innerText =

farmer.full_name ||
"Farmer";


document
.getElementById(
"farmerLocation"
)
.innerText =

`${farmer.village || ""}
${farmer.district || ""}`;


// FORM DATA

document
.getElementById(
"full_name"
)
.value =

farmer.full_name || "";


document
.getElementById(
"mobile"
)
.value =

farmer.mobile || "";


document
.getElementById(
"village"
)
.value =

farmer.village || "";


document
.getElementById(
"district"
)
.value =

farmer.district || "";


document
.getElementById(
"state"
)
.value =

farmer.state || "";


document
.getElementById(
"pincode"
)
.value =

farmer.pincode || "";


document
.getElementById(
"farm_name"
)
.value =

farmer.farm_name || "";


document
.getElementById(
"farm_size"
)
.value =

farmer.farm_size || "";


document
.getElementById(
"farm_type"
)
.value =

farmer.farm_type || "";


document
.getElementById(
"experience"
)
.value =

farmer.experience || "";


document
.getElementById(
"bio"
)
.value =

farmer.bio || "";


// ==========================
// PROFILE IMAGE
// ==========================

let imageUrl =

`https://ui-avatars.com/api/?name=${encodeURIComponent(
farmer.full_name
)}&background=198754&color=fff`;

if(
farmer.profile_image &&
farmer.profile_image.trim()
!== ""
){

if(
farmer.profile_image.startsWith(
"data:image"
)
){

imageUrl =
farmer.profile_image;

}
else{

imageUrl =
`data:image/jpeg;base64,${farmer.profile_image}`;

}

profileImageBase64 =
imageUrl;

}

document
.getElementById(
"profilePreview"
)
.src =
imageUrl;


// ==========================
// UPDATE LOCAL STORAGE
// ==========================

loggedFarmer.name =
farmer.full_name;

loggedFarmer.profile_image =
imageUrl;

localStorage.setItem(

"farmer",

JSON.stringify(
loggedFarmer
)

);

}
catch(error){

console.log(
"Profile Error:",
error
);

}

}



// ==========================
// IMAGE UPLOAD
// ==========================

document
.getElementById(
"profileInput"
)

.addEventListener(

"change",

function(e){

const file =
e.target.files[0];

if(!file)
return;

const reader =
new FileReader();

reader.onload =
function(){

profileImageBase64 =
reader.result;

document
.getElementById(
"profilePreview"
)
.src =

profileImageBase64;

};

reader.readAsDataURL(
file
);

}

);



// ==========================
// UPDATE PROFILE
// ==========================

async function
updateProfile(){

try{

const response =
await fetch(

`https://farm2hotel.onrender.com/api/farmers/profile/${loggedFarmer.id}`,

{

method:"PUT",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify({

full_name:

document
.getElementById(
"full_name"
)
.value,

mobile:

document
.getElementById(
"mobile"
)
.value,

village:

document
.getElementById(
"village"
)
.value,

district:

document
.getElementById(
"district"
)
.value,

state:

document
.getElementById(
"state"
)
.value,

pincode:

document
.getElementById(
"pincode"
)
.value,

farm_name:

document
.getElementById(
"farm_name"
)
.value,

farm_size:

document
.getElementById(
"farm_size"
)
.value,

farm_type:

document
.getElementById(
"farm_type"
)
.value,

experience:

document
.getElementById(
"experience"
)
.value,

bio:

document
.getElementById(
"bio"
)
.value,

profile_image:
profileImageBase64

})

}

);

const data =
await response.json();

alert(
data.message
);


// ==========================
// DASHBOARD IMAGE LIVE
// ==========================

loggedFarmer.name =

document
.getElementById(
"full_name"
)
.value;

loggedFarmer.profile_image =
profileImageBase64;

localStorage.setItem(

"farmer",

JSON.stringify(
loggedFarmer
)

);


// REFRESH

loadProfile();

}
catch(error){

console.log(
"Update Error:",
error
);

alert(
"Profile Update Failed"
);

}

}



// ==========================
// PAGE LOAD
// ==========================

window.onload =
function(){

loadProfile();

};

</script>

</body>
</html>
